appId: br.com.marcosbaradelli.english-glossary
productName: English Glossary
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**
  - package.json
  - "!node_modules"
extraResources:
  - from: .next/standalone
    to: app
  # electron-builder hard-drops the ROOT node_modules of any copied dir
  # (app-builder-lib/util/filter.js: `if (relative === "node_modules") return false`),
  # and no `filter` glob can override it. The standalone server + migrate.cjs resolve
  # @prisma/client / next / .prisma from .next/standalone/node_modules, so we copy that
  # tree back in via a companion entry whose `from` root is node_modules itself — none
  # of its children match the literal "node_modules" filter, so they all survive.
  - from: .next/standalone/node_modules
    to: app/node_modules
  - from: prisma/migrations
    to: migrations
asar: true
# Use the already-extracted Electron dist from node_modules instead of unzipping a
# downloaded copy. On this machine Kaspersky's real-time scanner holds freshly
# extracted .asar files just long enough for electron-builder's unlink of
# default_app.asar to fail with EBUSY; copying from a dist the scanner already
# knows sidesteps the race (and skips a redundant download).
electronDist: node_modules/electron/dist
# Dash-separated name so the local artifact, the GitHub asset and latest.yml all
# agree byte-for-byte (GitHub mangles spaces in asset names to dots on upload).
artifactName: English-Glossary-Setup-${version}.${ext}
win:
  target: nsis
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
publish:
  provider: github
  owner: Baradelli
  repo: english-glossary
