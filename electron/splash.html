<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Belt-and-suspenders: this file is only ever loaded via loadFile() from
         our own disk, but the CSP still blocks any external resource load
         (script/img/connect/etc.) should this markup ever be changed to
         reference one. Inline styles are allowed since that's how this file
         paints instantly, before the Next server is even listening. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'" />
    <title>English Glossary</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #f8fafc; /* slate-50 */
        color: #0f172a; /* slate-900 */
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        user-select: none;
      }
      .title {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .status {
        font-size: 0.95rem;
        color: #475569; /* slate-600 */
      }
      .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #cbd5e1; /* slate-300 */
        border-top-color: #0f172a; /* slate-900 */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Static only (this file has no JS): the splash is shown before we know
         the user's saved theme preference, so it can only go by the OS-level
         preference, same as the anti-FOUC script in app/layout.tsx. Prevents
         a bright flash for dark-OS users while the server boots. */
      @media (prefers-color-scheme: dark) {
        body {
          background: #020617; /* slate-950, matches app/layout.tsx's dark:bg-slate-950 */
          color: #f1f5f9; /* slate-100 */
        }
        .status {
          color: #94a3b8; /* slate-400 */
        }
        .spinner {
          border-color: #334155; /* slate-700 */
          border-top-color: #f1f5f9; /* slate-100 */
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <div class="title">English Glossary</div>
    <div class="status">iniciando…</div>
  </body>
</html>
