<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>English Glossary</title>
    <style>
      /* No external resources: the CSP would block them and the splash must
         paint instantly before the Next server is even listening. */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #f8fafc; /* slate-50 */
        color: #0f172a; /* slate-900 */
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        user-select: none;
      }
      .title {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .status {
        font-size: 0.95rem;
        color: #475569; /* slate-600 */
      }
      .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #cbd5e1; /* slate-300 */
        border-top-color: #0f172a; /* slate-900 */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <div class="title">English Glossary</div>
    <div class="status">iniciando…</div>
  </body>
</html>
